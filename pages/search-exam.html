<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/style.css">
    <title>חיפוש מבחן</title>
</head>
<body>
    <header>
        <h1>מערכת מבחנים - חיפוש מבחן</h1>
        <button onclick="window.location.href='student-dashboard.html'">חזור לדשבורד</button>
    </header>

    <main>
        <section>
            <h2>חפש מבחן לפי שם או קוד</h2>
            <form id="searchForm">
                <input type="text" id="searchInput" placeholder="הכנס שם או קוד מבחן (למשל: C101)" required style="width: 250px;">
                <button type="submit">חפש</button>
            </form>
        </section>

        <hr>

        <section>
            <h2>תוצאות חיפוש:</h2>
            <ul id="searchResults">
                <!-- תוצאות החיפוש יופיעו כאן -->
            </ul>
        </section>
    </main>

    <script type="module" src="../ui/SearchExamUI.js"></script>
    <script src="../ui/DarkModeUI.js"></script>
</body>
</html>
