<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>פרטי מבחן וניהול שאלות</title>
</head>
<body>
    <header>
        <h1>ניהול מבחן: <span id="displayTitle"></span></h1>
        <button onclick="window.location.href='teacher-dashboard.html'">חזור לדשבורד</button>
    </header>

    <main>
        <section id="examInfo">
            <!-- Exam details will be injected here via JS -->
        </section>

        <hr>

        <section>
            <h2>הוספת שאלה חדשה</h2>
            <form id="addQuestionForm">
                <input type="text" id="qText" placeholder="טקסט השאלה" required style="width: 300px;"><br><br>
                
                <!-- 4 Answers with Radio Buttons for the correct one -->
                <input type="radio" name="correct" value="0" required> 
                <input type="text" id="ans0" placeholder="תשובה 1" required><br>
                
                <input type="radio" name="correct" value="1"> 
                <input type="text" id="ans1" placeholder="תשובה 2" required><br>
                
                <input type="radio" name="correct" value="2"> 
                <input type="text" id="ans2" placeholder="תשובה 3" required><br>
                
                <input type="radio" name="correct" value="3"> 
                <input type="text" id="ans3" placeholder="תשובה 4" required><br><br>
                
                <button type="submit">הוסף שאלה למבחן</button>
            </form>
        </section>

        <hr>

        <section>
            <h2>שאלות קיימות במבחן (<span id="questionCount">0</span>)</h2>
            <ul id="questionsList"></ul>
        </section>
    </main>

    <script type="module" src="../ui/ExamDetailsUI.js"></script>
</body>
</html>
