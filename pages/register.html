<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/style.css">
    <title>הרשמה למערכת מבחנים</title>
</head>
<body>
    <h1>הרשמה למערכת</h1>
    <form id="registerForm">
        <input type="text" id="regName" placeholder="שם מלא" required><br><br>
        <input type="text" id="regTz" placeholder="תעודת זהות" required><br><br>
        <input type="password" id="regPassword" placeholder="סיסמה" required><br><br>
        
        <select id="regRole">
            <option value="student">סטודנט</option>
            <option value="teacher">מורה</option>
        </select><br><br>
        
        <button type="submit">הרשם</button>
    </form>
    
    <p id="regError" style="color: red;"></p>
    <a href="login.html">כבר יש לך חשבון? התחבר כאן</a>
    <button onclick="window.location.href='../index.html'" class="btn btn-outline-secondary mb-3">🏠 חזרה לדף הראשי</button>

    <script type="module" src="../ui/AuthUI.js"></script>
    <script src="../ui/DarkModeUI.js"></script>
</body>
</html>
