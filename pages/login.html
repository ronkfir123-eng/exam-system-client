<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/style.css">
    <title>התחברות למערכת מבחנים</title>
</head>
<body>
    <h1>התחברות</h1>
    <form id="loginForm">
        <input type="text" id="loginTz" placeholder="תעודת זהות" required><br><br>
        <input type="password" id="loginPassword" placeholder="סיסמה" required><br><br>
        <button type="submit">התחבר</button>
    </form>
    
    <p id="loginError" style="color: red;"></p>
    <a href="register.html">משתמש חדש? הירשם כאן</a>
    <button onclick="window.location.href='../index.html'" class="btn btn-outline-secondary mb-3">🏠 חזרה לדף הראשי</button>

    <script type="module" src="../UI/AuthUI.js"></script>
    <script src="../UI/DarkModeUI.js"></script>
</body>
</html>
